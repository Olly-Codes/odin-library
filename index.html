<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
</head>
<body>
    <main id="container">
        <form id="book-form">
            <p id="status"></p>
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" placeholder="e.g. Harry Potter" required>

            <label for="author">Author:</label>
            <input type="text" id="author" name="author" placeholder="e.g. J.K. Rowling" required>

            <label for="pages">Pages:</label>
            <input type="text" id="pages" name="pages" placeholder="e.g. 333" required>

            <label for="synopsis">Synopsis:</label>
            <textarea id="synopsis" name="synopsis"></textarea>

            <button type="submit" id="add-btn">Add Book</button>
        </form>
    </main>
    <script src="main.js"></script>
</body>
</html>
